<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            background: #E8ECED;
            font-family: Arial, Helvetica, sans-serif;
            color: #E8ECED;

        }

        body section {
            background: url("images/christus.webp");
            width: 1200px;
            height: 900px;
            object-fit: cover;
            background-position: 55% 50%;
            border: 8px solid black;
            border-radius: 50px;
            margin: 0 auto;
            align-items: center;
        }

        img {
            border: 8px solid #E8ECED;
            border-radius: 50%;
            height: 130px;
            width: 130px;
            object-fit: cover;
            object-position: 50% 20%;
        }

        #first_presidency {
            display: flex;
            justify-content: center;
            align-content: flex-end;
        }


        .councilor {
            height: 150px;
            width: 150px;
            margin: 20px;
        }

        #president {
            height: 190px;
            width: 190px;
        }

        #Quorum {
            display: grid;
            grid-template-columns: 255px 150px 150px 150px 150px 200px;
            grid-row-gap: 20px;
            grid-column-gap: 20px;
        }

        #Quorum :first-child, #Quorum :nth-child(5), #Quorum :nth-child(9) {
            grid-column-start: 2;
        }


         h1, h2 {
            margin: 20px auto;
            text-align: center;
        }

        h1 {
            font-size: 3em;
        }

        h2 {
            font-size: 2em;
        }

    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
     <section>
        <h1>First Presidency</h1>
        <div id="first_presidency">
            <img class = "councilor" src="images/eyring.webp" alt="President Eyring">
            <img id="president" src="images/oaks.webp" alt="President Oaks">
            <img class="councilor" src="images/christofferson.webp" alt="President Christofferson">
        </div>
        <h2>Quorum of the Twelve Apostles</h2>
        <div id="Quorum">
            <img src="images/holland.webp" alt="President Holland">
            <img src="images/uchtdorf.webp" alt="Elder Uchtdorf">
            <img src="images/bednar.webp" alt="Elder Bednar">
            <img src="images/cook.webp" alt="Elder Cook">
            <img src="images/stevenson.webp" alt="Elder Stevenson">
            <img src="images/rasband.webp" alt="Elder Rasband">
            <img src="images/anderson.webp" alt="Elder Anderson">
            <img src="images/renlund.webp" alt="Elder Renlund">
            <img src="images/gong.webp" alt="Elder Gong">
            <img src="images/soares.webp" alt="Elder Soares">
            <img src="images/kearon.webp" alt="Elder Kearon">
            <img src="images/causse.webp" alt="Elder Causse">
        </div>
    </section>
</body>
</html>
